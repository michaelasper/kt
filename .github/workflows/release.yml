name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      release_published: ${{ steps.semantic.outputs.release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install semantic-release dependencies
        run: |
          npm install -g \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@7

      - name: Run semantic-release (version detection only)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          set +e
          npx semantic-release --dry-run \
            --branches main \
            --preset conventionalcommits > /tmp/sr-output.log 2>&1
          exit_code=$?
          set -e

          cat /tmp/sr-output.log

          if grep -q "The next release version is" /tmp/sr-output.log; then
            version=$(grep -oP 'The next release version is \K[0-9.]+' /tmp/sr-output.log)
            echo "release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=$version" >> "$GITHUB_OUTPUT"
            echo "Version detected: v$version"
          else
            echo "release_published=false" >> "$GITHUB_OUTPUT"
            echo "No release needed"
          fi

  build-linux:
    name: Build Linux
    needs: prepare
    if: needs.prepare.outputs.release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        env:
          VERSION: ${{ needs.prepare.outputs.new_release_version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo build --release --target x86_64-unknown-linux-gnu
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../kt-linux-amd64.tar.gz kt
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kt-linux-amd64
          path: kt-linux-amd64.tar.gz

  build-macos:
    name: Build macOS
    needs: prepare
    if: needs.prepare.outputs.release_published == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install OpenSSL
        run: |
          brew install openssl
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Build release binary
        env:
          VERSION: ${{ needs.prepare.outputs.new_release_version }}
        run: |
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo build --release --target aarch64-apple-darwin
          cd target/aarch64-apple-darwin/release
          tar czf ../../../kt-darwin-arm64.tar.gz kt
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kt-darwin-arm64
          path: kt-darwin-arm64.tar.gz

  publish:
    name: Publish Release
    needs: [prepare, build-linux, build-macos]
    if: needs.prepare.outputs.release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: kt-linux-amd64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: kt-darwin-arm64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install semantic-release dependencies
        run: |
          npm install -g \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@11 \
            conventional-changelog-conventionalcommits@7

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
