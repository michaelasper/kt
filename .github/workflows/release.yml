name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_published: ${{ steps.semantic.outputs.release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install semantic-release dependencies
        run: |
          npm install -g \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@11 \
            conventional-changelog-conventionalcommits@7

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          set +e
          npx semantic-release \
            --branches main \
            --preset conventionalcommits > /tmp/sr-output.log 2>&1
          set -e

          cat /tmp/sr-output.log

          if grep -q "Published release" /tmp/sr-output.log; then
            version=$(grep -oP 'The next release version is \K[0-9.]+' /tmp/sr-output.log)
            echo "release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=$version" >> "$GITHUB_OUTPUT"
            echo "Release published: v$version"
          else
            echo "release_published=false" >> "$GITHUB_OUTPUT"
            echo "No release published"
          fi

      - name: Build Linux binary
        if: steps.semantic.outputs.release_published == 'true'
        run: |
          version="${{ steps.semantic.outputs.new_release_version }}"
          sed -i "s/^version = \".*\"/version = \"$version\"/" Cargo.toml
          cargo build --release --target x86_64-unknown-linux-gnu
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../kt-linux-amd64.tar.gz kt
          cd -

      - name: Upload release assets
        if: steps.semantic.outputs.release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: kt-linux-amd64.tar.gz
          tag_name: v${{ steps.semantic.outputs.new_release_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    needs: release
    if: needs.release.outputs.release_published == 'true'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install OpenSSL
        run: |
          brew install openssl
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Build release binary
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          sed -i '' "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" Cargo.toml
          cargo build --release --target aarch64-apple-darwin
          cd target/aarch64-apple-darwin/release
          tar czf ../../../kt-darwin-arm64.tar.gz kt
          cd -

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: kt-darwin-arm64.tar.gz
          tag_name: v${{ needs.release.outputs.new_release_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
