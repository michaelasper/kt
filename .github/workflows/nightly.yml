name: Nightly Build

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  nightly-build:
    name: Nightly Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kt-linux-amd64-nightly
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: kt-darwin-amd64-nightly
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kt-darwin-arm64-nightly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo +nightly build --release --target ${{ matrix.target }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact_name }}-${{ steps.date.outputs.date }}.tar.gz kt
          cd -

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.date.outputs.date }})
          body: |
            ## Nightly Build - ${{ steps.date.outputs.date }}
            
            This is an automated nightly build from the main branch.
            
            **⚠️ Warning:** Nightly builds may contain unstable features and bugs. Use at your own risk!
            
            ### Installation
            
            Download the appropriate binary for your platform:
            
            ```bash
            # macOS (Intel)
            curl -L https://github.com/michaelasper/kt/releases/download/nightly/kt-darwin-amd64-nightly-${{ steps.date.outputs.date }}.tar.gz | tar xz
            sudo mv kt /usr/local/bin/
            
            # macOS (Apple Silicon)
            curl -L https://github.com/michaelasper/kt/releases/download/nightly/kt-darwin-arm64-nightly-${{ steps.date.outputs.date }}.tar.gz | tar xz
            sudo mv kt /usr/local/bin/
            
            # Linux (x86_64)
            curl -L https://github.com/michaelasper/kt/releases/download/nightly/kt-linux-amd64-nightly-${{ steps.date.outputs.date }}.tar.gz | tar xz
            sudo mv kt /usr/local/bin/
            ```
            
            ### Changelog
            
            Built from commit: `${{ github.sha }}`
          files: ${{ matrix.artifact_name }}-${{ steps.date.outputs.date }}.tar.gz
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
